<!doctype html>
<html>
  <head>
    <title>NationsGlory</title>
    <meta charset="UTF-8" />
    <link
      rel="stylesheet"
      type="text/css"
      href="../style/style.css"
      media="screen"
    />
    <link
      rel="stylesheet"
      type="text/css"
      href="../style/main.css"
      media="screen"
    />
    <script src="../js/functions.js"></script>
    <script src="../js/utils.js"></script>
    <script src="../js/main.js"></script>
    <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'self'; media-src 'self' https://*.nationsglory.fr; style-src 'self' 'unsafe-inline'; script-src 'self' 'unsafe-inline'; connect-src 'self' data: blob: https://*.nationsglory.fr https://refuge-api.onrender.com https://refuge-api.onrender.com https://visage.surgeplay.com; img-src 'self' blob: data: https://*.nationsglory.fr https://i.ytimg.com https://visage.surgeplay.com"
    />
  </head>
  <body id="body">
    <header id="header">
      <div>&nbsp;</div>
      <ul>
        <li>
          <button onclick="WindowMinimize('launcher')">
            <img
              src="../images/icon_minimize.png"
              alt="Réduire"
              data-translate
            />
          </button>
        </li>
        <li>
          <button onclick="WindowMaximize('launcher')">
            <img
              src="../images/icon_fullscreen.png"
              alt="Agrandir"
              data-translate
            />
          </button>
        </li>
        <li>
          <button onclick="WindowClose('launcher')">
            <img src="../images/icon_close.png" alt="Fermer" data-translate />
          </button>
        </li>
      </ul>
    </header>
    <nav id="menu">
      <svg
        xmlns="http://www.w3.org/2000/svg"
        width="200"
        height="40"
        fill="none"
      >
        <img src="../images/Logo.svg" alt="RELaunch" id="logo" />
      </svg>
      <ul>
        <li onclick="ChangeRoute('launcher')" class="active">
          <img src="../images/Icon_Play.svg" alt="" />
        </li>
        <li onclick="ChangeRoute('twitch')">
          <img src="../images/Icon_Twitch.svg" alt="" />
        </li>
        <li
          onclick="ChangeRoute('accounts')"
          id="avatar"
          class="sidebarAvatar active"
        >
          <span class="is-pulse"></span>
          <img
            src="../images/User-2D.png"
            alt="avatar"
            style="image-rendering: pixelated"
          />
        </li>
        <li onclick="ChangeRoute('settings')">
          <img src="../images/Icon_Settings.svg" alt="" />
        </li>
      </ul>
    </nav>
    <iframe
      src="../routes/launcher.html"
      id="framecontent"
      frameborder="0"
    ></iframe>
  </body>
</html>
