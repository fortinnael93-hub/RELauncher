      <ul>
        <li onclick="ChangeRoute('launcher')" class="active">
          <img src="../images/Icon_Play.svg" alt="" />
        </li>
        <li onclick="ChangeRoute('radio')" id="NGRadio">
          <img src="../images/Icon_Music.svg" alt="" />
        </li>
        <li onclick="ChangeRoute('twitch')">
          <img src="../images/Icon_Twitch.svg" alt="" />
        </li>
        <li onclick="ChangeRoute('accounts')" id="avatar"></li>
        <li onclick="ChangeRoute('settings')">
          <img src="../images/Icon_Settings.svg" alt="" />
        </li>
      </ul>
    </nav>
    <div id="NGRadioModule">
      <div id="song-card">
        <img id="song-image" src="" alt="" />
        <div id="song-info">
          <h3 id="song-title">Dance The Night</h3>
          <p id="song-artist">Dua Lipa</p>
        </div>
        <div id="play-button">
          <img
            src="../images/Icon_PlayerPlay.svg"
            alt=""
            onclick="togglePlayPause()"
          />
        </div>
      </div>
    </div>
    <iframe
      src="../routes/launcher.html"
      id="framecontent"
      frameborder="0"
    ></iframe>
<script>
  // Add this BEFORE the nav markup or at the top of your first <script> block
  function ChangeRoute(route) {
    const iframe = document.getElementById('framecontent');
    if (iframe) {
      iframe.src = '../routes/' + route + '.html';
    }
    // Update active nav item
    document.querySelectorAll('#menu ul li').forEach(li => {
      li.classList.remove('active');
    });
    // Optionally highlight the clicked item — handled by caller or event
  }
</script>

      const instance = new Proxy(_axios, {
        get(target, prop) {
          return function (...args) {
            const url = args[0] || "";
            if (typeof url === "string" && url.includes("localhost:1")) {
              return Promise.resolve({ data: {} });
            }
            return target[prop](...args);
          };
        },
      });

      let max_ram = store.get("max_ram") || 2048;

      const API_RADIO = "http://localhost:1";

// ... code existant ...

      function displayConsoleInDiv(text) {
        const consoleDiv = document.getElementById("console");
        if (consoleDiv) {
          consoleDiv.innerHTML += `<p>${text}</p>`;
          consoleDiv.scrollTop = consoleDiv.scrollHeight;
        }
      }

      // Listener pour changer de route
      ipcRenderer.on('route', (event, file) => {
        const iframe = document.getElementById('framecontent');
        if (iframe) {
          iframe.src = '../routes/' + file;
        }
        document.querySelectorAll('#menu ul li').forEach(li => {
          li.classList.remove('active');
        });
      });
    </script>
    </script>
    <script src="../js/functions.js"></script>
    <script src="../js/main.js"></script>
  </body>
</html>
