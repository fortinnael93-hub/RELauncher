<!DOCTYPE html>
<html>
<head>
	<title data-translate>Mise à jour</title>
	<meta charset="UTF-8">
	<link rel="stylesheet" type="text/css" href="../style/update.css" media="screen"/>
	<script src="../js/update.js"></script>
</head>
<body>
	<div id="content">
		<div class="progress-container">
			<div class="progress-header">
				<span id="progress-text" data-translate>Mise à jour en cours...</span>
				<span id="progress-percent">(0%)</span>
			</div>
			<div class="progress-bar">
				<div class="progress-fill"></div>
			</div>
		</div>
		<div class="infobox" style="display:none;">
			<p>L'installation semble être bloquée. Veuillez relancer l'application en tant qu'administrateur.</p>
			<button id="restart-button" style="display:none;">Redémarrer en tant qu'administrateur</button>
			<p>Pour plus d'assistance, <a href="https://nationsglory.fr/">contacter le support sur le site.</a></p>
		</div>
	</div>
</body>
</html>
