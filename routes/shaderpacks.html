<link
  rel="stylesheet"
  type="text/css"
  href="../style/style.css"
  media="screen"
/>
<link
  rel="stylesheet"
  type="text/css"
  href="../style/settings.css"
  media="screen"
/>
<link
  rel="stylesheet"
  type="text/css"
  href="../style/shaderpacks.css"
  media="screen"
/>
<header id="headerSettings">
  <h2 data-translate>Paramètres</h2>
</header>
<nav id="sidebar">
  <ul>
    <li onclick="ChangeRoute('settings')" data-translate>Paramètres</li>
    <li onclick="ChangeRoute('skins')" data-translate>Skins</li>
    <li onclick="ChangeRoute('accounts')" data-translate>Comptes</li>
    <li onclick="ChangeRoute('resourcepacks')" data-translate>
      Packs de ressources
    </li>
    <li onclick="ChangeRoute('shaderpacks')" class="active" data-translate>
      Packs de shaders
    </li>
    <li onclick="ChangeRoute('screenshots')" data-translate>Screenshots</li>
    <li onclick="ChangeRoute('console')" data-translate>Console</li>
    <li onclick="ChangeRoute('crashreports')" data-translate>
      Rapports de crash
    </li>
    <li onclick="ChangeRoute('about')" data-translate>À propos</li>
    <li onclick="logout()" data-translate>Déconnexion</li>
  </ul>
</nav>
<main id="settings">
  <h2 data-translate>Packs de shaders</h2>
  <div id="dropZone" class="dropzone">
    <img src="../images/Icon_Upload.png" alt="" />
    <span data-translate>Glisse ton fichier ZIP ici...</span>
    <input type="file" id="fileInput" accept=".zip" multiple />
  </div>
  <h2 data-translate>Liste</h2>
  <p data-translate>Retrouve la liste de tes packs de shaders</p>
  <ul id="fileList">
    Loading...
  </ul>
</main>
<script src="../js/functions.js"></script>
<script src="../js/utils.js"></script>
<script src="../js/shaderpacks.js"></script>
